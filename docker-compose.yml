services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${PG_NAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - my_app
    restart:
      unless-stopped
  
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_URI: "postgres:5432/${PG_NAME}?sslmode=disable"
      DATA_SOURCE_USER: ${PG_USER}
      DATA_SOURCE_PASS: ${PG_PASSWD}
    ports:
      - "9187:9187"
    networks:
      - my_app
    depends_on:
      - postgres
    restart: unless-stopped

  redis:
    image: redis
    container_name: redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/var/lib/redis/data
    # healthcheck:
    #   test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    networks:
      - my_app
    restart:
      unless-stopped

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: backend    
    environment:
      POSTGRES_HOST: ${PG_HOST}
      POSTGRES_PORT: ${PG_PORT}
      POSTGRES_DB: ${PG_NAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWD}

      REDIS_HOST: ${RD_HOST}
      REDIS_PORT: ${RD_PORT}
    ports:
      - "5005:5000" 
    depends_on:
      - postgres
      - redis
    networks:
      - my_app
    restart:
      unless-stopped

  nginx:
    image: nginx
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/log/my_app:/var/log/nginx
      - ./nginx/cache:/data/nginx/cache
    networks:
      - my_app
    ports:
      - 80:80
    depends_on:
      - backend
    restart:
      unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - '-nginx.scrape-uri=http://nginx:80/nginx_status'
    ports:
      - "9113:9113"
    networks:
      - my_app
    depends_on:
      - nginx
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter
    container_name: node_exporter
    hostname: node_exporter
    ports:
      - "9101:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    environment:
      TZ: "Europe/Moscow"
    networks:
      - my_app
    restart:
      unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports: 
      - "9091:9090"
    volumes:
      - ./conf_files/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus/
    hostname: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    environment:
      TZ: "Europe/Moscow"
    networks:
      - my_app
    depends_on:
      - node_exporter    
    restart:
      unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports: 
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
    volumes:
      - ./conf_files/grafana.yml:/etc/grafana/provisioning/datasources/datasource.yaml
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - my_app
    restart:
      unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  my_app:
    driver: bridge